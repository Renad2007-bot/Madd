<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>مدد – لوحة التحكم</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      /* ─── تنسيقات الربط الذكي ─── */
      .ocr-upload-container {
        margin-top: 15px;
        padding: 15px;
        border: 2px dashed var(--green-main);
        border-radius: 12px;
        background: #f0f9f4;
        text-align: center;
      }
      .ocr-btn {
        background: var(--green-dark);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
      }
      .ocr-btn:hover {
        background: var(--green-main);
        transform: translateY(-1px);
      }

      /* ─── التنسيقات الأصلية ─── */
      .welcome-banner {
        background: linear-gradient(
          135deg,
          var(--green-dark),
          var(--green-main)
        );
        color: white;
        border-radius: var(--radius-lg);
        padding: 28px 32px;
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 20px;
        position: relative;
        overflow: hidden;
      }
      .welcome-banner::before {
        content: "";
        position: absolute;
        top: -40px;
        left: -40px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        pointer-events: none;
      }
      .welcome-banner::after {
        content: "";
        position: absolute;
        bottom: -30px;
        right: 60px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
        pointer-events: none;
      }
      .wb-left {
        position: relative;
        z-index: 1;
      }
      .wb-greeting {
        font-size: 13px;
        font-weight: 500;
        opacity: 0.8;
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }
      .wb-text h2 {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 6px;
        line-height: 1.2;
      }
      .wb-text p {
        opacity: 0.8;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .wb-badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.18);
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
      .wb-right {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }
      .wb-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 800;
        color: white;
        border: 2.5px solid rgba(255, 255, 255, 0.35);
      }
      .wb-date {
        font-size: 11px;
        opacity: 0.7;
        text-align: left;
      }
      .score-stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
      }
      .score-stat-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 16px 18px;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: all 0.22s;
        position: relative;
        overflow: hidden;
      }
      .score-stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }
      .score-stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 4px;
        height: 100%;
        border-radius: 0 var(--radius) var(--radius) 0;
      }
      .score-stat-card.ssc-green::before {
        background: var(--green-main);
      }
      .score-stat-card.ssc-gold::before {
        background: var(--gold);
      }
      .score-stat-card.ssc-dark::before {
        background: var(--green-dark);
      }
      .score-stat-card.ssc-teal::before {
        background: #3a9e68;
      }
      .ssc-label {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 6px;
      }
      .ssc-value {
        font-size: 30px;
        font-weight: 800;
        color: var(--text-dark);
        line-height: 1;
        margin-bottom: 8px;
      }
      .ssc-status {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .ssc-bar-track {
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .ssc-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.7s ease;
      }
      .gpa-hero-card {
        background: linear-gradient(135deg, #1a3a2e, var(--green-dark));
        border-radius: var(--radius-lg);
        padding: 20px 24px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 20px;
        color: white;
      }
      .gpa-ring-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        flex-shrink: 0;
      }
      .gpa-ring-wrap svg {
        width: 72px;
        height: 72px;
        transform: rotate(-90deg);
      }
      .gpa-ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.15);
        stroke-width: 6;
      }
      .gpa-ring-fg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.85);
        stroke-width: 6;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.8s ease;
      }
      .gpa-ring-text {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .gpa-val {
        font-size: 18px;
        font-weight: 800;
        color: white;
        line-height: 1;
      }
      .gpa-of5 {
        font-size: 10px;
        opacity: 0.7;
        color: white;
      }
      .gpa-info {
        flex: 1;
      }
      .gpa-info-title {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 4px;
      }
      .gpa-info-sub {
        font-size: 13px;
        opacity: 0.75;
      }
      .gpa-info-badges {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .gpa-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }
      .course-mini-list {
        margin-bottom: 18px;
      }
      .course-mini-item {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 12px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1.5px solid var(--border);
        transition: all 0.2s;
      }
      .course-mini-item:hover {
        border-color: rgba(45, 106, 74, 0.25);
      }
      .cmi-bar {
        width: 5px;
        height: 40px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .cmi-name {
        flex: 1;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dark);
      }
      .cmi-score {
        font-size: 18px;
        font-weight: 800;
      }
      .cmi-grade {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 12px;
      }
      .home-section-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .home-section-title svg {
        width: 16px;
        height: 16px;
        color: var(--green-main);
      }
      .ai-msg-card {
        background: linear-gradient(135deg, #1a4a2e, #2d6a4a);
        color: white;
        border-radius: var(--radius);
        padding: 18px 22px;
        margin-bottom: 16px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .ai-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .ai-msg-text {
        font-size: 14px;
        line-height: 1.6;
        opacity: 0.95;
      }
      /* ══ Markdown rendered output ══ */
      .md-h1 {
        font-size: 16px;
        font-weight: 800;
        color: var(--text-dark);
        margin: 14px 0 6px;
      }
      .md-h2 {
        font-size: 14px;
        font-weight: 800;
        color: var(--green-dark);
        margin: 12px 0 5px;
      }
      .md-h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-mid);
        margin: 10px 0 4px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .md-li {
        display: flex;
        gap: 7px;
        margin: 4px 0;
        font-size: 14px;
        line-height: 1.6;
      }
      .md-bullet {
        color: var(--green-main);
        flex-shrink: 0;
        font-weight: 700;
        margin-top: 1px;
      }
      .md-num {
        color: var(--green-main);
        flex-shrink: 0;
        font-weight: 700;
        min-width: 18px;
      }
      .md-hr {
        border: none;
        border-top: 1.5px solid var(--border);
        margin: 10px 0;
      }
      .md-gap {
        height: 8px;
      }
      /* light version for white-on-dark cards */
      .ai-msg-card .md-h2 {
        color: rgba(255, 255, 255, 0.85);
      }
      .ai-msg-card .md-bullet,
      .ai-msg-card .md-num {
        color: rgba(255, 255, 255, 0.7);
      }
      .ai-msg-card .md-hr {
        border-color: rgba(255, 255, 255, 0.2);
      }
      /* ══ Messages page ══ */
      .msgs-input-wrap {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px 18px;
        margin-bottom: 20px;
      }
      /* Legacy - keep for other uses */
      .msgs-suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .msgs-suggestion {
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: white;
        cursor: pointer;
        font-family: inherit;
        color: var(--text-mid);
        transition: all 0.15s;
      }
      .msgs-suggestion:hover {
        border-color: var(--green-main);
        color: var(--green-dark);
        background: var(--green-light);
      }
      .msg-bubble {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px 18px;
        margin-bottom: 14px;
      }
      .msg-bubble-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .msg-bubble-av {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--green-dark),
          var(--green-main)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: white;
      }
      .msg-bubble-q {
        font-size: 12px;
        background: var(--bg);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text-mid);
        margin-bottom: 8px;
        font-style: italic;
        border-right: 3px solid var(--green-main);
      }
      .msg-bubble-body {
        font-size: 14px;
        line-height: 1.75;
        color: var(--text-dark);
      }

      .exam-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 14px;
      }
      .exam-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .exam-title {
        font-size: 16px;
        font-weight: 700;
      }
      .exam-toggle {
        display: flex;
        gap: 8px;
      }
      .toggle-btn {
        padding: 6px 16px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        font-family: "Cairo", sans-serif;
        font-size: 13px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
      }
      .toggle-btn.active {
        background: var(--green-dark);
        color: white;
        border-color: var(--green-dark);
      }
      .score-input-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .score-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dark);
        white-space: nowrap;
      }
      .score-input {
        padding: 10px 14px;
        border: 1.8px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: "Cairo", sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-align: center;
        width: 100px;
        outline: none;
      }
      .score-input:focus {
        border-color: var(--green-main);
      }
      .score-pct {
        font-size: 13px;
        color: var(--text-muted);
        width: 40px;
      }
      .grade-breakdown {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .grade-item {
        background: var(--bg);
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }
      .grade-item input {
        width: 60px;
        padding: 6px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        text-align: center;
        font-family: "Cairo", sans-serif;
        font-size: 14px;
        font-weight: 700;
        outline: none;
      }
      .grade-item input:focus {
        border-color: var(--green-main);
      }
      .grade-item-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 5px;
      }
      /* ══ REPORTS PAGE ══ */
      .rp-page {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .rp-hero {
        background: linear-gradient(
          135deg,
          var(--green-dark) 0%,
          var(--green-main) 100%
        );
        border-radius: var(--radius-lg);
        padding: 24px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        position: relative;
        overflow: hidden;
      }
      .rp-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 1px,
          transparent 1px
        );
        background-size: 22px 22px;
      }
      .rp-hero-text {
        position: relative;
        z-index: 1;
      }
      .rp-hero-title {
        font-size: 22px;
        font-weight: 800;
        color: white;
        margin-bottom: 4px;
      }
      .rp-hero-sub {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.72);
      }
      .rp-kpis {
        display: flex;
        gap: 10px;
        position: relative;
        z-index: 1;
        flex-wrap: wrap;
      }
      .rp-kpi {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 10px 16px;
        text-align: center;
        min-width: 80px;
        backdrop-filter: blur(4px);
      }
      .rp-kpi-val {
        font-size: 22px;
        font-weight: 800;
        color: white;
        line-height: 1;
      }
      .rp-kpi-lbl {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.72);
        margin-top: 3px;
      }
      .rp-kpi.gold {
        background: rgba(201, 168, 76, 0.25);
      }
      .rp-kpi.danger {
        background: rgba(217, 79, 79, 0.22);
      }
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 4px;
      }
      .chart-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 22px;
        box-shadow: var(--shadow-sm);
        border: 1.5px solid var(--border);
      }
      .chart-card-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .chart-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-dark);
      }
      .chart-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        background: var(--green-light);
        color: var(--green-dark);
      }
      .rp-major-card {
        background: var(--bg);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 10px;
        border: 1.5px solid var(--border);
        transition: all 0.2s;
      }
      .rp-major-card:hover {
        border-color: rgba(45, 106, 74, 0.25);
        box-shadow: var(--shadow-sm);
      }
      .rp-major-top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .rp-major-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--green-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .rp-major-info {
        flex: 1;
      }
      .rp-major-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
      }
      .rp-major-uni {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .rp-major-pct {
        text-align: center;
      }
      .rp-major-pct-num {
        font-size: 26px;
        font-weight: 800;
        color: var(--green-dark);
        line-height: 1;
      }
      .rp-major-pct-lbl {
        font-size: 10px;
        color: var(--text-muted);
      }
      .rp-major-bar {
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .rp-major-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--green-main),
          var(--green-dark)
        );
        border-radius: 3px;
        transition: width 0.6s ease;
      }
      .rp-major-meta {
        font-size: 11px;
        color: var(--text-muted);
      }
      .rp-strengths {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      .rp-strength-item {
        background: var(--green-light);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--green-dark);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .rp-improve-item {
        background: #fff8e7;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--gold-dark);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .rp-moti {
        background: linear-gradient(135deg, #1a4a2e, #2d6a4a);
        border-radius: 12px;
        padding: 18px 20px;
        color: white;
        font-size: 14px;
        line-height: 1.7;
        margin-top: 14px;
      }
      .community-page-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .community-page-title h2 {
        margin: 0 0 4px;
        color: var(--text-dark);
      }
      .community-page-title p {
        margin: 0;
        color: var(--text-muted);
        font-size: 13px;
      }
      .rp-empty {
        text-align: center;
        padding: 36px 20px;
      }
      .rp-empty-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--bg-card);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        color: var(--text-muted);
      }
      .rp-empty-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 6px;
      }
      .rp-empty-sub {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 18px;
      }
      .rp-no-data {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }
      .rp-alert-card {
        background: var(--bg);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        border-right: 4px solid var(--warning);
      }
      .rp-alert-icon {
        font-size: 22px;
        flex-shrink: 0;
        line-height: 1.3;
      }
      .rp-alert-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-dark);

      /* ── خريطة المجتمع الجميلة ── */
      .comm-map-wrap {
        border-radius: var(--radius-lg);
        overflow: hidden;
        position: relative;
        box-shadow: var(--shadow);
      }
      .comm-map-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 60%,
          rgba(0, 0, 0, 0.08) 100%
        );
        pointer-events: none;
        z-index: 2;
      }
      #commMap {
        height: 240px;
        width: 100%;
      }
      @keyframes mapPulse {
        0% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.55;
        }
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
      }
      @keyframes mapRing {
        0% {
          transform: scale(0.8);
          opacity: 0.7;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }
      .map-pin {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .map-pin-dot {
        width: 34px;
        height: 34px;
        border-radius: 50%;

        align-items: center;
        justify-content: center;

        font-weight: 800;
        color: white;
        border: 2.5px solid white;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
        cursor: pointer;
        animation: mapPulse 2.8s ease-in-out infinite;
        position: relative;
        z-index: 2;
      }
      .map-pin-ring {
        position: absolute;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid currentColor;
        animation: mapRing 2s ease-out infinite;
        z-index: 1;
      }
      .leaflet-popup-content-wrapper {

      .comm-popup {

        font-size: 14px;
        font-weight: 700;

      }

        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green-main);
      }
      .chat-view {
        display: flex;
        flex-direction: column;
      }
      .chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface);
        border-radius: var(--radius) var(--radius) 0 0;
        border: 1.5px solid var(--border);
        border-bottom: none;
      }
      .chat-back {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--green-dark);
        font-size: 22px;
        line-height: 1;
        padding: 0 4px;
      }
      .chat-header-info {
        flex: 1;
      }
      .chat-header-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
      }
      .chat-header-sub {
        font-size: 12px;
        color: var(--text-muted);
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 320px;
        max-height: 420px;
        background: var(--bg);
        border-right: 1.5px solid var(--border);
        border-left: 1.5px solid var(--border);
      }
      .chat-bubble-wrap {
        display: flex;
        flex-direction: column;
      }
      .chat-bubble-wrap.mine {
        align-items: flex-end;
      }
      .chat-bubble-wrap.theirs {
        align-items: flex-start;
      }
      .chat-bubble {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
      }
      .chat-bubble.mine {
        background: var(--green-dark);
        color: white;
        border-bottom-left-radius: 4px;
      }
      .chat-bubble.theirs {
        background: var(--surface);
        border: 1.5px solid var(--border);
        color: var(--text-dark);
        border-bottom-right-radius: 4px;
      }
      .chat-time {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .chat-input-bar {
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius) var(--radius);
        display: flex;
        gap: 10px;
        background: var(--surface);
      }
      .chat-input {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: 22px;
        padding: 10px 16px;
        font-family: "Cairo", sans-serif;
        font-size: 14px;
        outline: none;
        background: var(--bg);
        color: var(--text-dark);
      }
      .chat-input:focus {
        border-color: var(--green-main);
      }
      .chat-send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--green-dark);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .chat-send-btn:hover {
        background: var(--green-main);
      }
      .req-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 16px 18px;
        border: 1.5px solid var(--border);
        margin-bottom: 10px;
      }
      .req-card-top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .req-intro-text {
        background: var(--bg);
        border-radius: 10px;
        padding: 12px;
        font-size: 13px;
        color: var(--text-mid);
        line-height: 1.65;
        margin-bottom: 12px;
      }
      .req-post-ref {
        font-size: 11px;
        color: var(--text-muted);
        padding: 8px 12px;
        background: var(--bg-card);
        border-radius: 8px;
        margin-bottom: 12px;
        border-right: 3px solid var(--green-main);
      }
      .req-actions {
        display: flex;
        gap: 8px;
      }
      .chat-stopped-banner {
        background: #fef3e2;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 13px;
        color: var(--gold-dark);
        text-align: center;
        margin-top: 12px;
      }

      /* ══ COURSE CARDS ══ */
      .courses-page {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .courses-top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .courses-gpa-chip {
        background: linear-gradient(
          135deg,
          var(--green-dark),
          var(--green-main)
        );
        color: white;
        border-radius: 14px;
        padding: 10px 20px;
        font-size: 15px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .courses-gpa-chip span {
        font-size: 11px;
        opacity: 0.8;
        font-weight: 500;
      }
      .course-cards-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .course-card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        border: 1.5px solid var(--border);
        overflow: hidden;
        transition: box-shadow 0.2s;
      }
      .course-card:hover {
        box-shadow: var(--shadow);
      }
      .course-card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
      }
      .course-card-av {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 800;
        color: white;
        flex-shrink: 0;
      }
      .course-card-info {
        flex: 1;
        min-width: 0;
      }
      .course-card-name-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .course-card-meta {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .course-subject-tag {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        background: var(--bg);
        color: var(--text-mid);
        border: 1px solid var(--border);
      }
      .course-card-right {
        text-align: left;
        flex-shrink: 0;
        min-width: 80px;
      }
      .course-card-score {
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
      }
      .course-card-of {
        font-size: 11px;
        color: var(--text-muted);
      }
      .course-card-pill {
        margin-top: 5px;
      }
      .course-card-body {
        padding: 0 20px 18px;
        border-top: 1px solid var(--border);
        display: none;
      }
      .course-card.open .course-card-body {
        display: block;
      }
      .course-card-chevron {
        transition: transform 0.25s;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .course-card.open .course-card-chevron {
        transform: rotate(180deg);
      }
      /* component rows */
      .comp-list {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-top: 14px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .comp-row {
        display: grid;
        grid-template-columns: 26px 1fr 90px 74px;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      .comp-row:last-child {
        border-bottom: none;
      }
      .comp-row.done-row {
        background: var(--surface);
      }
      .comp-row.pending-row {
        background: var(--bg);
        opacity: 0.7;
      }
      /* done toggle */
      .comp-toggle {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .comp-toggle.active {
        background: var(--green-main);
        border-color: var(--green-main);
      }
      .comp-toggle svg {
        width: 13px;
        height: 13px;
        stroke: white;
      }
      .comp-toggle:not(.active) svg {
        display: none;
      }
      .comp-label-col {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .comp-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-mid);
      }
      .comp-row.done-row .comp-label {
        color: var(--text-dark);
      }
      .comp-pending-label {
        font-size: 11px;
        color: var(--text-muted);
      }
      .comp-warn {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 11px;
        color: var(--danger);
        font-weight: 600;
        margin-top: 1px;
      }
      .comp-warn svg {
        width: 11px;
        height: 11px;
      }
      .comp-bar-wrap {
        background: var(--border);
        border-radius: 50px;
        height: 7px;
        overflow: hidden;
      }
      .comp-bar-fill {
        height: 100%;
        border-radius: 50px;
        transition: width 0.4s ease;
      }
      .comp-input-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .comp-input {
        width: 44px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 5px 7px;
        font-family: "Cairo", sans-serif;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
        outline: none;
        background: var(--bg);
        color: var(--text-dark);
        transition: border-color 0.2s;
      }
      .comp-input:focus {
        border-color: var(--green-main);
      }
      .comp-input:disabled {
        color: var(--text-muted);
        cursor: not-allowed;
      }
      .comp-of {
        font-size: 11px;
        color: var(--text-muted);
      }
      /* card footer */
      .course-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed var(--border);
        flex-wrap: wrap;
        gap: 8px;
      }
      .course-card-footer-stats {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .course-card-footer-stats strong {
        color: var(--text-dark);
        font-size: 13px;
      }
      .course-name-input {
        border: none;
        outline: none;
        background: transparent;
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
        font-family: "Cairo", sans-serif;
        width: 100%;
        max-width: 200px;
      }
      .course-name-input:focus {
        border-bottom: 1.5px solid var(--green-main);
      }
      /* add-course modal */
      .dist-templates {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }
      .dist-template {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
        background: var(--surface);
      }
      .dist-template.selected {
        border-color: var(--green-main);
        background: var(--green-light);
      }
      .dist-template-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-dark);
      }
      .dist-template-desc {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 3px;
        line-height: 1.5;
      }
      .custom-comps-area {
        margin-top: 10px;
        display: none;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 12px;
      }
      .custom-comps-area.show {
        display: block;
      }
      .custom-comp-row {
        display: grid;
        grid-template-columns: 1fr 80px 28px;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .courses-hint {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 10px 14px;
        background: var(--bg);
        border-radius: 10px;
        line-height: 1.5;
      }
      .courses-hint svg {
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* ══ COMMUNITY TOPICS ══ */
      .topic-filter-bar {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .topic-filter-bar::-webkit-scrollbar {
        display: none;
      }
      .topic-chip {
        padding: 7px 16px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 700;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--text-mid);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .topic-chip.active {
        color: white;
        border-color: transparent;
      }
      .post-topic-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .composer-topic-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .composer-topic-label {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .composer-topic-select {
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 6px 12px;
        font-family: "Cairo", sans-serif;
        font-size: 12px;
        font-weight: 600;
        background: var(--bg);
        color: var(--text-dark);
        outline: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .composer-topic-select:focus {
        border-color: var(--green-main);
      }
      .feed-empty {
        text-align: center;
        padding: 48px 20px;
      }
      .feed-empty svg {
        display: block;
        margin: 0 auto 14px;
      }

      /* ══ MEMBER CARDS REDESIGN ══ */
      .member-card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        border: 1.5px solid var(--border);
        transition: all 0.25s;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .member-card:hover {
        box-shadow: var(--shadow);
        border-color: rgba(45, 106, 74, 0.2);
        transform: translateY(-2px);
      }
      .member-card-header {
        padding: 16px 16px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .member-av {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        font-weight: 800;
        color: white;
      }
      .member-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 3px;
      }
      .member-city-row {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: var(--text-muted);
      }
      .member-city-row svg {
        width: 11px;
        height: 11px;
        flex-shrink: 0;
      }
      .member-post-preview {
        padding: 10px 16px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        min-height: 60px;
      }
      .member-post-topic {
        margin-bottom: 5px;
      }
      .member-post-text {
        font-size: 12px;
        color: var(--text-mid);
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .member-post-empty {
        font-size: 12px;
        color: var(--text-muted);
        font-style: italic;
      }
      .member-ints {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 10px 16px;
      }
      .mi-tag {
        padding: 3px 10px;
        border-radius: 20px;
        background: var(--bg-card);
        color: var(--text-mid);
        font-size: 11px;
        font-weight: 600;
      }
      .mi-common {
        background: var(--green-light);
        color: var(--green-dark);
      }
      .mi-common-label {
        font-size: 11px;
        color: var(--green-main);
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 16px 10px;
      }
      .mi-common-label svg {
        width: 12px;
        height: 12px;
      }
      .member-card-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        margin-top: auto;
      }
      .member-profile-btn {
        width: 100%;
        padding: 9px 14px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        font-family: "Cairo", sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--green-dark);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .member-profile-btn:hover {
        background: var(--green-light);
        border-color: var(--green-main);
      }
      .member-profile-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ══ MEMBER PROFILE MODAL ══ */
      .mpanel-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .mpanel-overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .mpanel-box {
        background: var(--surface);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 720px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
        transform: translateY(16px) scale(0.97);
        transition: transform 0.28s ease;
        overflow: hidden;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
      }
      .mpanel-overlay.show .mpanel-box {
        transform: translateY(0) scale(1);
      }
      .mpanel-head {
        padding: 28px 20px 20px;
        text-align: center;
        position: relative;
      }
      .mpanel-close {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 16px;
        line-height: 1;
        transition: background 0.15s;
      }
      .mpanel-close:hover {
        background: rgba(255, 255, 255, 0.32);
      }
      .mpanel-av {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        margin: 0 auto 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
        color: white;
        border: 3px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      .mpanel-name {
        font-size: 20px;
        font-weight: 800;
        color: white;
        margin-bottom: 4px;
      }
      .mpanel-badges {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .mpanel-type-badge {
        padding: 4px 14px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }
      .mpanel-city {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mpanel-city svg {
        width: 13px;
        height: 13px;
      }
      .mpanel-body {
        flex: 1;
        overflow-y: auto;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .mpanel-section-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 8px;
      }
      .mpanel-post-card {
        background: var(--bg);
        border-radius: 12px;
        padding: 12px 14px;
        border: 1.5px solid var(--border);
      }
      .mpanel-post-card-text {
        font-size: 13px;
        color: var(--text-mid);
        line-height: 1.7;
        margin-top: 6px;
      }
      .mpanel-post-time {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }
      .mpanel-no-posts {
        font-size: 12px;
        color: var(--text-muted);
        font-style: italic;
        text-align: center;
        padding: 12px 0;
      }
      .mpanel-footer {
        padding: 14px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }
      .mpanel-kpi-grid {
        display: grid;

    <!-- Firebase Firestore for real messaging -->
    <script type="module">
      import { db } from './js/firebase-config.js';
      import { collection, addDoc, query, where, orderBy, limit,
        getDocs, updateDoc, doc, serverTimestamp, getDoc, setDoc
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

      window._db = db;

      window.fsAddPost = async function(post) {
        try { await addDoc(collection(db,'communityPosts'),{...post,time:serverTimestamp()}); return true; }
        catch(e){ console.warn('fsAddPost:',e); return false; }
      };
      window.fsLoadPosts = async function(city) {
        try {
          const q = query(collection(db,'communityPosts'), orderBy('time','desc'), limit(40));
          const snap = await getDocs(q);
          return snap.docs.map(d=>({id:d.id,...d.data(),time:d.data().time?.toMillis?.()||Date.now()}));
        } catch(e){ console.warn('fsLoadPosts:',e); return null; }
      };
      window.fsLoadRequests = async function() {
        try {
          // No orderBy to avoid composite index requirement — sort in JS
          const q = query(collection(db,'communityPosts'), where('type','in',['secondary','university']), limit(60));
          const snap = await getDocs(q);
          return snap.docs.map(d=>({id:d.id,...d.data(),time:d.data().time?.toMillis?.()||Date.now()}))
            .sort((a,b)=>b.time-a.time);
        } catch(e){ console.warn('fsLoadRequests:',e); return null; }
      };
      window.fsSendMessage = async function(msg) {
        try { await addDoc(collection(db,'messages'),{...msg,time:serverTimestamp(),read:false}); return true; }
        catch(e){ console.warn('fsSendMessage:',e); return false; }
      };
      window.fsLoadInbox = async function(uid) {
        try {
          // Query both uid formats (Firebase UID and email) — match whichever was stored
          const q = query(collection(db,'messages'), where('toUid','==',uid), limit(50));
          const snap = await getDocs(q);
          return snap.docs.map(d=>({id:d.id,...d.data(),time:d.data().time?.toMillis?.()||Date.now()}))
            .sort((a,b)=>b.time-a.time);
        } catch(e){ console.warn('fsLoadInbox:',e); return null; }
      };
      window.fsMarkRead = async function(msgId) {
        try { await updateDoc(doc(db,'messages',msgId),{read:true}); } catch(e){}
      };
      window.fsSaveReply = async function(requestId, mentorUid, mentorName, studentUid, studentName, replyText) {
        try {
          await addDoc(collection(db,'messages'),{
            fromUid:mentorUid, fromName:mentorName, fromType:'mentor',
            toUid:studentUid, toName:studentName,
            text:replyText, requestId, time:serverTimestamp(), read:false
          });
          return true;
        } catch(e){ console.warn('fsSaveReply:',e); return false; }
      };
      window.fsCountUnreadMsgs = async function(uid) {
        try {
          // No compound where to avoid index requirement
          const q = query(collection(db,'messages'), where('toUid','==',uid), limit(100));
          const snap = await getDocs(q);
          return snap.docs.filter(d=>!d.data().read).length;
        } catch(e){ return 0; }
      };
      window.fsGetUser = async function(uid) {
        try {
          const snap = await getDoc(doc(db,'users',uid));
          if(snap.exists()) return { uid, ...snap.data() };
          return null;
        } catch(e){ console.warn('fsGetUser:',e); return null; }
      };
      window.fsLoadUserProfile = async function(uid) {
        if(!uid) return null;
        const normalizeTs = v => v?.toMillis?.() ? v.toMillis() : v;
        const build = async (id, data) => {
          if(!data) return null;
          const profile = { id, uid: data.uid || id || data.email || uid, ...data };
          // also try to load from a separate 'courses' collection
          const courseQueries = [
            query(collection(db,'courses'), where('userId','==',uid), limit(30)),
            query(collection(db,'courses'), where('uid','==',uid), limit(30)),
            query(collection(db,'courses'), where('studentUid','==',uid), limit(30)),
          ];
          const courses = [];
          for(const cq of courseQueries){
            try {
              const cs = await getDocs(cq);
              cs.docs.forEach(cd=>{ const c=cd.data(); courses.push({id:cd.id,...c,createdAt:normalizeTs(c.createdAt),updatedAt:normalizeTs(c.updatedAt)}); });
            } catch(e){}
          }
          if(courses.length){
            const seen=new Set();
            profile.courses = courses.filter(c=>{ const k=c.id||c.courseId||c.name||c.courseName; if(seen.has(k))return false; seen.add(k);return true; });
          }
          return profile;
        };
        try {
          const direct = await getDoc(doc(db,'users',uid));
          if(direct.exists()) return await build(direct.id, direct.data());
        } catch(e){}
        const fallbackQueries = [
          query(collection(db,'users'), where('uid','==',uid), limit(1)),
          query(collection(db,'users'), where('email','==',uid), limit(1)),
        ];
        for(const qx of fallbackQueries){
          try {
            const snap = await getDocs(qx);
            if(!snap.empty){ const d=snap.docs[0]; return await build(d.id, d.data()); }
          } catch(e){}
        }
        return null;
      };
      window.fsSyncCoursesToFirestore = async function(uid, courses) {
        if(!uid || !Array.isArray(courses)) return;
        try {
          // Normalize to {name, score} before saving
          const normalized = courses.map(c => {
            const name = c.name || 'مقرر';
            if(typeof c.score === 'number' && !c.components) return {name, score: c.score};
            // compute from components if needed — simple sum
            const total = (c.components||[]).filter(x=>x.done).reduce((s,x)=>s+(+(x.grade||0)),0);
            const max   = (c.components||[]).filter(x=>x.done).reduce((s,x)=>s+(+(x.max||0)),0);
            const score = max>0 ? Math.round(total/max*100) : Math.round((+(c.hw||0)++(c.proj||0)++(c.mid||0)++(c.final||0)));
            return {name, score};
          }).filter(c=>c.score>0);
          await setDoc(doc(db,'users',uid), {courses: normalized}, {merge:true});
        } catch(e){ console.warn('fsSyncCoursesToFirestore:',e); }
      };
      window.fsSyncGpaToFirestore = async function(uid, gpa) {
        if(!uid || !gpa) return;
        try { await setDoc(doc(db,'users',uid), {uniGpa: String(gpa)}, {merge:true}); } catch(e){}
      };
      window._fsReady = true;
      document.dispatchEvent(new CustomEvent('fsReady'));
    </script>
    <script>

      function initMap() {

          window._maddMap = null;
        }

          defaultLng = 46.7219;
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => buildMap(pos.coords.latitude, pos.coords.longitude),
            () => buildMap(defaultLat, defaultLng),
            { timeout: 4000 },
          );
        } else {
          buildMap(defaultLat, defaultLng);
        }
      }

      const CITY_COORDS = {
        الرياض: [24.6877, 46.7219],
        جدة: [21.4858, 39.1925],
        "مكة المكرمة": [21.3891, 39.8579],

        الدمام: [26.4207, 50.0888],
        الخبر: [26.2172, 50.1971],
        تبوك: [28.3998, 36.5715],
        بريدة: [26.3264, 43.975],
        "خميس مشيط": [18.3067, 42.7286],

        الطائف: [21.2703, 40.4158],
        حائل: [27.5219, 41.6906],
        نجران: [17.4922, 44.1277],
        جازان: [16.8892, 42.5511],

        سكاكا: [29.9674, 40.205],

      async function buildMap(lat, lng) {
        if (!window.L) {
          // load Leaflet JS if not present
          await new Promise((res, rej) => {
            const s = document.createElement("script");
            s.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
            s.onload = res;
            s.onerror = rej;
            document.head.appendChild(s);
          });
        }

        // try city coords first for accuracy
        const cityCoords = CITY_COORDS[user.city];
        const finalLat = cityCoords?.[0] || lat;
        const finalLng = cityCoords?.[1] || lng;

        const map = L.map("commMap", {
          zoomControl: false,
          attributionControl: false,
        }).setView([finalLat, finalLng], 13);
        window._maddMap = map;

        // جميل نظيف — CartoDB Positron
        L.tileLayer(
          "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          {
            maxZoom: 19,
            subdomains: "abcd",
          },
        ).addTo(map);

        // زر تكبير/تصغير بالاتجاه الصح
        L.control.zoom({ position: "bottomright" }).addTo(map);

        const AV_COLOR_MAP = {
          secondary: "#c9a84c",
          university: "#2d6a4a",
          mentor: "#1a3a6a",
          student: "#c9a84c",
        };
        const TYPE_LABEL = {
          secondary: "طالب ثانوي",
          university: "طالب جامعي",
          mentor: "مرشد",
          student: "طالب",
        };
        const TYPE_BADGE_STYLE = {
          secondary: "background:#e8f5ea;color:#2d6a4a",
          university: "background:#fff8e7;color:#8a6a00",
          mentor: "background:#e8edf5;color:#1a3a6a",
        };

        function makePin(initial, color, delay = 0, size = 36) {
          return `<div class="map-pin" style="animation-delay:${delay}ms">
      <div class="map-pin-ring" style="color:${color};animation-delay:${delay}ms"></div>
      <div class="map-pin-dot" style="background:${color};width:${size}px;height:${size}px;animation-delay:${delay}ms">${initial}</div>
    </div>`;
        }

        // ── دبوس المستخدم الحالي ──
        const meColor = AV_COLOR_MAP[user.type] || "#2d6a4a";
        const meIcon = L.divIcon({
          html: makePin((user.name || "أ").charAt(0), meColor, 0, 40),
          className: "",
          iconSize: [40, 40],
          iconAnchor: [20, 20],
        });
        const allPosts = loadData("communityPosts") || [];
        const _myMapIds = new Set((loadData("myPostIds") || []).map(String));
        const _myMapUid = user.uid || user.email;
        const myPosts = allPosts
          .filter(
            (p) =>
              _myMapIds.has(String(p.id)) ||
              (p.authorUid && p.authorUid === _myMapUid),
          )
          .sort((a, b) => new Date(b.time) - new Date(a.time));
        const myLatest = myPosts[0];
        const myTopic = myLatest ? getTopicById(myLatest.topic) : null;
        const myPostBlock = myLatest
          ? `<div class="comm-popup-post">
    ${myTopic ? `<span class="comm-popup-post-badge" style="background:${myTopic.bg};color:${myTopic.color};">${myTopic.label}</span>` : ""}
    <div class="comm-popup-post-text">"${(myLatest.text || myLatest.brief || "").slice(0, 70)}..."</div>
  </div>`
          : "";
        const mePopup = `<div class="comm-popup">
    <div class="comm-popup-head" style="background:${meColor};">
      <div class="comm-popup-name">${user.name}</div>
      <span class="comm-popup-type">${TYPE_LABEL[user.type] || ""}</span>
      <div style="font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;">أنت · ${myPosts.length} منشور</div>
    </div>
    ${myPostBlock}
  </div>`;
        L.marker([finalLat, finalLng], { icon: meIcon })
          .addTo(map)
          .bindPopup(mePopup, { className: "comm-popup-wrap" })
          .openPopup();

        // ── دبابيس المجتمع ──
        const posts = loadData("communityPosts") || [];
        const communityUsers = _allCommunityUsers
          .filter((u) => (u.uid || u.email) !== (user.uid || user.email))
          .slice(0, 20);
        communityUsers.forEach((u, i) => {
          const spread = 0.008;
          const angle =
            (i / Math.max(communityUsers.length, 1)) * Math.PI * 2 +
            Math.PI * 0.3;
          const r = spread * (0.6 + Math.random() * 0.8);
          const uLat = finalLat + Math.sin(angle) * r;
          const uLng = finalLng + Math.cos(angle) * r * 1.3;
          const col = AV_COLOR_MAP[u.type] || "#888";
          const delay = 300 + i * 180;
          const icon = L.divIcon({
            html: makePin((u.name || "؟").charAt(0), col, delay, 32),
            className: "",
            iconSize: [32, 32],
            iconAnchor: [16, 16],
          });
          const uid = (u.uid || u.email || "").replace(/'/g, "");
          // find latest post
          const uPosts = posts
            .filter((p) => p.authorUid === (u.uid || u.email))
            .sort((a, b) => new Date(b.time) - new Date(a.time));
          const latestPost = uPosts[0];

          }
          const popup = `<div class="comm-popup">
      <div class="comm-popup-head" style="background:${col};">
        <div class="comm-popup-name">${u.name || "مجهول"}</div>
        <span class="comm-popup-type">${TYPE_LABEL[u.type] || ""}</span>
      </div>
      ${postBlock}
      <button class="comm-popup-btn" onclick="showMemberProfile('${uid}')">عرض الملف الكامل</button>
    </div>`;
          L.marker([uLat, uLng], { icon })
            .addTo(map)
            .bindPopup(popup, { className: "comm-popup-wrap" });
        });
      }

      function renderSecondaryHome(el) {
        const scores = loadData("secScores") || {};
        const hasScores =
          scores.qiyas || scores.tahsili || scores.step || scores.school;
        const examPlans = ["qiyas", "tahsili", "step"]
          .map((k) => {
            const p = loadData("examPlan_" + k) || {};
            return {
              k,
              name: { qiyas: "القدرات", tahsili: "التحصيلي", step: "ستيب" }[k],
              days: p.date ? getDaysLeft(p.date) : null,
              decided: p.decided,
            };
          })
          .filter(
            (p) => p.decided === "decided" && p.days !== null && p.days > 0,
          );

        function sscCard(val, label, colorClass) {
          const v = +(val || 0);
          const pct = val ? Math.min(v, 100) : 0;
          const barColor = !val
            ? "var(--border)"
            : v >= 85
              ? "var(--green-main)"
              : v >= 70
                ? "var(--gold)"
                : "var(--danger)";
          const status = !val
            ? "لم تُدخل بعد"
            : v >= 90
              ? "ممتاز"
              : v >= 80
                ? "جيد جداً"
                : v >= 70
                  ? "جيد"
                  : v >= 60
                    ? "مقبول"

        ).length;

        const gpaCirc = 2 * Math.PI * 30;
        const gpaDash = gpaNum ? gpaCirc * (1 - gpaNum / gpaMax) : gpaCirc;

          gpaNum >= 4.5
            ? "ممتاز"

              ? "جيد جداً"

          .filter((c) => calcDoneMax(c) > 0)

            const pa = calcDoneTotal(a) / calcDoneMax(a);
            const pb = calcDoneTotal(b) / calcDoneMax(b);
            return pb - pa;
          });
        const toGr = (t) =>
          t >= 95
            ? "A+"

              ? "A"
              : t >= 85
                ? "B+"
                : t >= 80
                  ? "B"
                  : t >= 75
                    ? "C+"

          ${danger ? `<div class="gpa-badge" style="background:rgba(217,79,79,.2);color:#c03030;display:flex;align-items:center;gap:3px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:11px;height:11px;"><path d="m10.29 3.86-8.27 14.27a1 1 0 0 0 .86 1.5h16.54a1 1 0 0 0 .86-1.5L12 3.86a1 1 0 0 0-1.71 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${danger} خطر</div>` : ""}

    ${

        ? `

      المقررات
    </div>
    <div class="course-mini-list anim-up">
      ${courses
        .map((c) => {
          const dm = calcDoneMax(c);
          const dt = calcDoneTotal(c);
          const pct = dm > 0 ? Math.round((dt / dm) * 100) : 0;
          const barCol =
            dm === 0
              ? "var(--border)"
              : pct >= 85
                ? "var(--green-main)"
                : pct >= 70
                  ? "var(--gold)"
                  : "var(--danger)";
          const gradeLabel = dm > 0 ? toGr(pct) : "--";
          const gradeStyle =
            dm === 0
              ? "background:var(--bg-card);color:var(--text-muted)"
              : pct >= 85
                ? "background:#e8f5ea;color:#2d6a4a"
                : pct >= 70
                  ? "background:#fff8e7;color:#8a6a00"
                  : "background:#fdecea;color:#c03030";
          return `<div class="course-mini-item" onclick="navigateTo('grades')">
          <div class="cmi-bar" style="background:${barCol};"></div>
          <div class="cmi-name">${c.name}${c.subject ? `<span style="font-size:10px;color:var(--text-muted);margin-right:5px;">${c.subject}</span>` : ""}</div>
          <div style="text-align:left;">
            <div class="cmi-score" style="color:${barCol}">${dm > 0 ? pct + "%" : "--"}</div>

        : `<div style="background:var(--surface);border-radius:var(--radius-lg);padding:36px 24px;text-align:center;border:1.5px dashed var(--border);margin-bottom:18px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;margin:0 auto 14px;display:block;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px;">أضف مقرراتك لهذا الترم</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">ابدأ بتتبع أدائك من اليوم الأول</div>
      <button class="btn btn-primary" onclick="navigateTo('grades')">إضافة المقررات</button>

    }
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">
      <button class="btn btn-primary" onclick="navigateTo('grades')">جدول المقررات</button>
      <button class="btn btn-outline" onclick="navigateTo('community')">المجتمع</button>
    </div>
    <div id="quickAlerts"></div>`;

      function loadQuickAlerts() {
        const el = document.getElementById("quickAlerts");
        if (!el) return;
        const alerts = buildDataAlerts();
        if (alerts.length) renderAlerts(el, alerts);
      }

      function buildDataAlerts() {
        const alerts = [];
        if (user.type === "secondary") {
          const sc = loadData("secScores") || {};
          const exams = ["qiyas", "tahsili", "step"];
          const names = { qiyas: "القدرات", tahsili: "التحصيلي", step: "ستيب" };
          // اختبار قادم
          exams.forEach((k) => {
            const plan = loadData("examPlan_" + k) || {};
            if (plan.decided === "decided" && plan.date) {
              const days = getDaysLeft(plan.date);
              if (days > 0 && days <= 30)
                alerts.push({
                  type: "warning",
                  icon: "calendar",
                  title: `${names[k]} بعد ${days} يوم`,
                  text: `وقت مراجعة مكثفة — ركّز على المحاور الضعيفة وحلّ نماذج سابقة يومياً.`,
                });
              else if (days > 30 && days <= 60)
                alerts.push({
                  type: "info",
                  icon: "calendar",
                  title: `${names[k]} بعد ${days} يوم`,
                  text: `ابدأ مراجعة منتظمة الآن بدل الانتظار. ساعة يومياً تصنع فرقاً كبيراً.`,
                });
            }
          });
          if (sc.qiyas && +sc.qiyas < 70)
            alerts.push({
              type: "warning",
              icon: "alert",
              title: `القدرات ${sc.qiyas} — يحتاج رفع`,
              text: `هدف 80+ قابل للتحقيق. التدريب على الأسئلة القياسية أسبوعياً يرفع الدرجة بشكل ملحوظ.`,
            });
          if (sc.tahsili && +sc.tahsili < 70)
            alerts.push({
              type: "warning",
              icon: "alert",
              title: `التحصيلي ${sc.tahsili} — يحتاج مراجعة`,
              text: `ركّز على التخصصات الأساسية (رياضيات، علوم) وراجع الكتب المدرسية المحدّثة.`,
            });
          if (sc.school && +sc.school < 80)
            alerts.push({
              type: "warning",
              icon: "book",
              title: `نسبة المدرسة ${sc.school}% — يمكن تحسينها`,
              text: `التواصل مع معلميك وتسليم الواجبات في وقتها يرفع نسبتك بشكل تراكمي.`,
            });
          const missing = exams.filter(
            (k) => !sc[k + "Done"] && !loadData("examPlan_" + k)?.decided,
          );
          if (missing.length === 3)
            alerts.push({
              type: "info",
              icon: "info",
              title: "أدخل خطة اختباراتك",
              text: `حدّد موعد اختبار ${missing[0] in names ? names[missing[0]] : "القدرات"} لتبدأ منصة مدد في بناء خطتك الدراسية.`,
            });
        } else if (user.type === "university") {
          const cs = loadData("uniCourses") || [];
          const weak = cs.filter(
            (c) =>
              calcDoneMax(c) > 0 && calcDoneTotal(c) / calcDoneMax(c) < 0.7,
          );
          const noData = cs.filter((c) => calcDoneMax(c) === 0);
          if (weak.length)
            alerts.push({
              type: "warning",
              icon: "alert",
              title: `${weak.length} مقرر أداؤه تحت 70%`,
              text: `${weak.map((c) => c.name).join("، ")} — تواصل مع الأستاذ وحضّر أسئلة المراجعة قبل الاختبار النهائي.`,
            });
          if (noData.length && cs.length > 0)
            alerts.push({
              type: "info",
              icon: "chart",

      function getDaysLeft(dateStr) {
        if (!dateStr) return 0;
        const diff = new Date(dateStr) - new Date();
        return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
      }

      function calcWazna() {
        const get = (id) => parseFloat(document.getElementById(id)?.value) || 0;
        const pQiyas = get("wPct_qiyas"),
          pTahsili = get("wPct_tahsili"),
          pStep = get("wPct_step"),
          pSchool = get("wPct_school");
        const sQiyas = get("wScore_qiyas"),
          sTahsili = get("wScore_tahsili"),
          sStep = get("wScore_step"),
          sSchool = get("wScore_school");
        const totalPct = pQiyas + pTahsili + pStep + pSchool;
        if (totalPct === 0) return;
        if (Math.abs(totalPct - 100) > 1) {
          showToast(`مجموع النسب ${totalPct}% — يجب أن يساوي 100%`, "error");
          return;
        }
        const wazna = (
          (sQiyas * pQiyas +
            sTahsili * pTahsili +
            sStep * pStep +
            sSchool * pSchool) /
          100
        ).toFixed(2);
        const resEl = document.getElementById("waznaResult");
        const scoreEl = document.getElementById("waznaScore");
        if (resEl && scoreEl) {
          resEl.style.display = "block";
          scoreEl.textContent = isNaN(wazna) ? "--" : wazna + "%";
        }
        saveData("waznaData", {
          pct_qiyas: pQiyas,
          pct_tahsili: pTahsili,
          pct_step: pStep,
          pct_school: pSchool,
          score_qiyas: sQiyas,
          score_tahsili: sTahsili,
          score_step: sStep,
          score_school: sSchool,
        });
      }
