          <div style="font-size:13px;color:var(--text-muted);">فعّل المكونات التي خلصت واحسب أداءك بدقة</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="courses-gpa-chip"><span>المعدل</span><span id="gpaChipVal" style="font-size:22px;font-weight:800;">--</span><span>/5</span></div>
          <button class="btn btn-primary btn-sm" onclick="showAddCourseModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة مقرر
          </button>
        </div>
      </div>

      <div class="courses-hint anim-up" style="animation-delay:.04s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--green-main);"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        فعّل المكون بالنقر على المربع عندما يُقيَّم. الدرجة تُحسب فقط من المكونات المكتملة — إذا خلص نص الترم ودرجاتك 40/40 يظهر كامل بدل 40/100.
      </div>

      <div class="course-cards-grid" id="courseCardsGrid"></div>

      <div style="display:flex;gap:12px;margin-top:4px;">
        <button class="btn btn-outline" onclick="navigateTo('reports')">الرسوم البيانية</button>
      </div>
    </div>

    <div class="modal-overlay" id="addCourseModal" onclick="if(event.target===this)this.classList.remove('show')">
      <div class="modal-box" style="max-width:480px;max-height:90vh;overflow-y:auto;">
        <div class="modal-title">إضافة مقرر جديد</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">اسم المقرر</label>
            <input class="form-input" id="newCourseName" placeholder="مثال: خوارزميات وهياكل البيانات">
          </div>
          <div class="form-group">
            <label class="form-label">الساعات المعتمدة</label>
            <select class="form-select" id="newCourseCredits">
              <option value="1">1 ساعة</option>
              <option value="2">2 ساعة</option>
              <option value="3" selected>3 ساعات</option>
              <option value="4">4 ساعات</option>
              <option value="5">5 ساعات</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">المجال (اختياري)</label>
            <input class="form-input" id="newCourseSubject" placeholder="مثال: برمجة، رياضيات" list="subjectsList">
            <datalist id="subjectsList">
              <option value="برمجة وتقنية">
              <option value="رياضيات">
              <option value="هندسة">
              <option value="علوم طبيعية">
              <option value="طب وصحة">
              <option value="أعمال وإدارة">
              <option value="لغات">
              <option value="علوم إنسانية">
              <option value="فيزياء">
              <option value="كيمياء">
              <option value="أحياء">
              <option value="إحصاء وبيانات">
            </datalist>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">توزيع الدرجات</label>
          <div class="dist-templates" id="distTemplates">
            <div class="dist-template selected" data-tpl="standard" onclick="selectTemplate(this)">
              <div class="dist-template-name">قياسي</div>
              <div class="dist-template-desc">واجبات(10) + مشاريع(10) + ميدترم(30) + فاينل(50)</div>
            </div>
            <div class="dist-template" data-tpl="theory" onclick="selectTemplate(this)">
              <div class="dist-template-name">نظري</div>
              <div class="dist-template-desc">ميدترم(40) + فاينل(60)</div>
            </div>
            <div class="dist-template" data-tpl="practical" onclick="selectTemplate(this)">
              <div class="dist-template-name">مكثف</div>
              <div class="dist-template-desc">واجبات(20) + مشاريع(10) + ميدترم(20) + فاينل(50)</div>
            </div>
            <div class="dist-template" data-tpl="custom" onclick="selectTemplate(this)">
              <div class="dist-template-name">مخصص</div>
              <div class="dist-template-desc">حدد توزيع الدرجات يدوياً (المجموع = 100)</div>
            </div>
          </div>
          <div class="custom-comps-area" id="customCompsArea">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">اسم المكون · درجاته من 100</div>
            <div id="customCompsList"></div>
            <button class="btn btn-ghost btn-sm" onclick="addCustomComp()" style="margin-top:6px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              إضافة مكون
            </button>
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
          <button class="btn btn-ghost" onclick="document.getElementById('addCourseModal').classList.remove('show')">إلغاء</button>
          <button class="btn btn-primary" onclick="saveNewCourse()">إضافة المقرر</button>
        </div>
      </div>
    </div>`;
        renderCourseCards();
      }

      const DIST_TEMPLATES = {
        standard: [
          { name: "واجبات", max: 10 },
          { name: "مشاريع", max: 10 },
          { name: "ميدترم", max: 30 },
          { name: "فاينل", max: 50 },
        ],
        theory: [
          { name: "ميدترم", max: 40 },
          { name: "فاينل", max: 60 },
        ],
        practical: [
          { name: "واجبات", max: 20 },
          { name: "مشاريع", max: 10 },
          { name: "ميدترم", max: 20 },
          { name: "فاينل", max: 50 },
        ],
      };

      let _selectedTpl = "standard";
      let _customComps = [];

      function selectTemplate(el) {
        document
          .querySelectorAll(".dist-template")
          .forEach((e) => e.classList.remove("selected"));
        el.classList.add("selected");
        _selectedTpl = el.dataset.tpl;
        const ca = document.getElementById("customCompsArea");
        if (_selectedTpl === "custom") {
          ca.classList.add("show");
          if (_customComps.length === 0)
            _customComps = [
              { name: "", max: 50 },
              { name: "", max: 50 },
            ];
          renderCustomComps();
        } else {
          ca.classList.remove("show");
        }
      }

      function renderCustomComps() {
        const list = document.getElementById("customCompsList");
        if (!list) return;
        list.innerHTML = _customComps
          .map(
            (c, i) => `
    <div class="custom-comp-row">
      <input class="form-input" style="padding:7px 12px;" placeholder="اسم المكون" value="${c.name}" oninput="_customComps[${i}].name=this.value">
      <input class="form-input" style="padding:7px 8px;text-align:center;" type="number" min="1" max="100" placeholder="من 100" value="${c.max || ""}" oninput="_customComps[${i}].max=+this.value">
      <button onclick="_customComps.splice(${i},1);renderCustomComps()" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;padding:0;">✕</button>
    </div>`,
          )
          .join("");
      }

      function addCustomComp() {
        _customComps.push({ name: "", max: 10 });
        renderCustomComps();
      }

      function saveNewCourse() {
        const name = document.getElementById("newCourseName")?.value?.trim();
        if (!name) {
          showToast("أدخل اسم المقرر", "error");
          return;
        }
        const credits = +(
          document.getElementById("newCourseCredits")?.value || 3
        );
        const subject =
          document.getElementById("newCourseSubject")?.value?.trim() || "";
        let comps;
        if (_selectedTpl === "custom") {
          comps = _customComps.filter((c) => c.name && c.max > 0);
          if (!comps.length) {
            showToast("أضف مكوناً واحداً على الأقل", "error");
            return;
          }
          const tot = comps.reduce((s, c) => s + c.max, 0);
          if (tot !== 100) {
            showToast(`مجموع المكونات ${tot} — يجب أن يساوي 100`, "error");
            return;
          }
        } else {
          comps = DIST_TEMPLATES[_selectedTpl].map((c) => ({
            ...c,
            grade: "",
            done: false,
          }));
        }
        const cs = loadData("uniCourses") || [];
        cs.push({ name, credits, subject, components: comps, status: "warn" });
        saveData("uniCourses", cs);
        _syncCoursesNow();
        _customComps = [];
        _selectedTpl = "standard";
        document.getElementById("addCourseModal")?.classList.remove("show");
        renderCourseCards();
        showToast(`تمت إضافة "${name}"`);
      }

      function showAddCourseModal() {
        _selectedTpl = "standard";
        _customComps = [];
        document
          .querySelectorAll(".dist-template")
          .forEach((e) => e.classList.remove("selected"));
        document
          .querySelector('.dist-template[data-tpl="standard"]')
          ?.classList.add("selected");
        const ca = document.getElementById("customCompsArea");
        if (ca) ca.classList.remove("show");
        const ni = document.getElementById("newCourseName");
        if (ni) ni.value = "";
        const si = document.getElementById("newCourseSubject");
        if (si) si.value = "";
        document.getElementById("addCourseModal")?.classList.add("show");
      }

      function calcTotal(c) {
        if (c.components?.length)
          return c.components.reduce((s, comp) => s + +(comp.grade || 0), 0);
        return +(c.hw || 0) + +(c.proj || 0) + +(c.mid || 0) + +(c.final || 0);
      }
      function calcMax(c) {
        if (c.components?.length)
          return c.components.reduce((s, comp) => s + +(comp.max || 0), 0);
        return 100;
      }
      // completed = only done components
      function calcDoneTotal(c) {
        if (c.components?.length)
          return c.components
            .filter((x) => x.done)
            .reduce((s, x) => s + +(x.grade || 0), 0);
        return calcTotal(c);
      }
      function calcDoneMax(c) {
        if (c.components?.length)
          return c.components
            .filter((x) => x.done)
            .reduce((s, x) => s + +(x.max || 0), 0);
        return calcMax(c);
      }

      const COURSE_COLORS = [
        "#2d6a4a",
        "#1a3a6a",
        "#7b4f1a",
        "#5a1a6a",
        "#1a5a6a",
        "#6a1a1a",
        "#1a6a5a",
        "#3a4a1a",
      ];
      const WARN_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m10.29 3.86-8.27 14.27a1 1 0 0 0 .86 1.5h16.54a1 1 0 0 0 .86-1.5L12 3.86a1 1 0 0 0-1.71 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
      const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

      function renderCourseCards() {
        const grid = document.getElementById("courseCardsGrid");
        if (!grid) return;
        const cs = loadData("uniCourses") || [];
        const gpa = getGPALive();
        const gpaEl = document.getElementById("gpaChipVal");
        if (gpaEl) gpaEl.textContent = gpa;

        if (!cs.length) {
          grid.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-muted);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;margin:0 auto 14px;display:block;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px;">لا توجد مقررات بعد</div>
      <div style="font-size:13px;">ابدأ بإضافة مقرراتك لمتابعة أدائك الأكاديمي</div>
    </div>`;
          return;
        }

        grid.innerHTML = cs
          .map((c, i) => {
            // migrate old format
            let comps = c.components;
            if (!comps) {
              comps = [];
              if (c.hw !== undefined)
                comps.push({
                  name: "واجبات",
                  max: 10,
                  grade: c.hw || "",
                  done: c.hw !== "" && c.hw !== undefined,
                });
              if (c.proj !== undefined)
                comps.push({
                  name: "مشاريع",
                  max: 10,
                  grade: c.proj || "",
                  done: c.proj !== "" && c.proj !== undefined,
                });
              if (c.mid !== undefined)
                comps.push({
                  name: "ميدترم",
                  max: 30,
                  grade: c.mid || "",
                  done: c.mid !== "" && c.mid !== undefined,
                });
              if (c.final !== undefined)
                comps.push({
                  name: "فاينل",
                  max: 50,
                  grade: c.final || "",
                  done: c.final !== "" && c.final !== undefined,
                });
            }

            const doneComps = comps.filter((x) => x.done);
            const doneTotal = doneComps.reduce(
              (s, x) => s + +(x.grade || 0),
              0,
            );
            const doneMax = doneComps.reduce((s, x) => s + +(x.max || 0), 0);
            const pendingMax = comps
              .filter((x) => !x.done)
              .reduce((s, x) => s + +(x.max || 0), 0);
            const donePct =
              doneMax > 0 ? Math.round((doneTotal / doneMax) * 100) : 0;

            const status =
              doneMax === 0
                ? "none"
                : donePct >= 85
                  ? "safe"
                  : donePct >= 70
                    ? "warn"
                    : "danger";
            const statusColor =
              status === "safe"
                ? "var(--success)"
                : status === "warn"
                  ? "var(--warning)"
                  : status === "danger"
                    ? "var(--danger)"
                    : "var(--text-muted)";
            const statusLabel =
              status === "safe"
                ? "ممتاز"
                : status === "warn"
                  ? "تنبيه"
                  : status === "danger"
                    ? "يحتاج جهداً"
                    : "لم تبدأ بعد";

            const color = COURSE_COLORS[i % COURSE_COLORS.length];
            const displayScore = doneMax > 0 ? `${doneTotal}/${doneMax}` : "--";
            const displayPct = doneMax > 0 ? `${donePct}%` : "";

            const compRows = comps
              .map((comp, ci) => {
                const isDone = !!comp.done;
                const g = +(comp.grade || 0);
                const pctComp =
                  comp.max > 0 && isDone ? Math.round((g / comp.max) * 100) : 0;
                const barColor =
                  pctComp >= 85
                    ? "var(--success)"
                    : pctComp >= 60
                      ? "var(--warning)"
                      : "var(--danger)";
                const lowWarn =
                  isDone && g < comp.max * 0.6 && comp.grade !== "";
                return `<div class="comp-row ${isDone ? "done-row" : "pending-row"}">
        <div class="comp-toggle ${isDone ? "active" : ""}" onclick="toggleComponentDone(${i},${ci})" title="${isDone ? "انقر لإلغاء التفعيل" : "انقر عند اكتمال هذا التقييم"}">${isDone ? CHECK_SVG : ""}</div>
        <div class="comp-label-col">
          <div class="comp-label">${comp.name} <span style="color:var(--text-muted);font-weight:400;font-size:11px;">(${comp.max})</span></div>
          ${!isDone ? `<div class="comp-pending-label">قيد الانتظار — فعّل عند التقييم</div>` : ""}
          ${lowWarn ? `<div class="comp-warn">${WARN_SVG} أقل من 60% (${pctComp}%)</div>` : ""}
        </div>
        <div>
          ${isDone ? `<div class="comp-bar-wrap"><div class="comp-bar-fill" style="width:${pctComp}%;background:${barColor};"></div></div>` : ""}
        </div>
        <div class="comp-input-wrap">
          <input class="comp-input" type="number" min="0" max="${comp.max}"
            value="${isDone && comp.grade !== "" && comp.grade !== undefined ? comp.grade : ""}"
            placeholder="${isDone ? "0" : "--"}"
            ${!isDone ? "disabled" : ""}
            onchange="updateComponent(${i},${ci},this.value)">
          <span class="comp-of">/${comp.max}</span>
        </div>
      </div>`;
              })
              .join("");

            const totalAll = calcTotal(c);
            const maxAll = calcMax(c);

            return `<div class="course-card anim-up" id="courseCard${i}" style="animation-delay:${i * 40}ms">
      <div class="course-card-header" onclick="toggleCourseCard(${i})">
        <div class="course-card-av" style="background:${color}">${(c.name || "م").charAt(0)}</div>
        <div class="course-card-info">
          <div class="course-card-name-row">
            <input class="course-name-input" value="${c.name}" onchange="updateCourseName(${i},this.value)" onclick="event.stopPropagation()">
            ${c.subject ? `<span class="course-subject-tag">${c.subject}</span>` : ""}
          </div>
          <div class="course-card-meta">
            <span>${c.credits || 3} ساعات</span>
            <span>·</span>
            <span>${doneComps.length}/${comps.length} مكونات مكتملة</span>
            ${pendingMax > 0 ? `<span>·</span><span style="color:var(--text-muted);">${pendingMax} باقية</span>` : ""}
          </div>
        </div>
        <div class="course-card-right">
          <div class="course-card-score" style="color:${statusColor}">${displayScore}</div>
          ${displayPct ? `<div class="course-card-of">${displayPct}</div>` : ""}
          <div class="course-card-pill"><span class="status-pill pill-${status === "none" ? "warn" : status}">${statusLabel}</span></div>
        </div>
        <svg class="course-card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="course-card-body">
        <div class="comp-list">${compRows}</div>
        <div class="course-card-footer">
          <div class="course-card-footer-stats">
            ${doneMax > 0 ? `<span>مكتمل: <strong style="color:${statusColor};">${doneTotal}/${doneMax}</strong></span>` : ""}
            ${doneMax > 0 && doneMax < maxAll ? `<span>متوقع نهائي: <strong>${totalAll}/${maxAll}</strong></span>` : ""}
          </div>
          <button onclick="removeCourse(${i})" class="btn btn-ghost btn-sm" style="color:var(--danger);">حذف المقرر</button>
        </div>
      </div>
    </div>`;
          })
          .join("");
        updateGPA();
      }

      function toggleCourseCard(i) {
        const card = document.getElementById(`courseCard${i}`);
        if (card) card.classList.toggle("open");
      }

      function _ensureComponents(cs, ci) {
        if (!cs[ci].components) {
          cs[ci].components = [
            {
              name: "واجبات",
              max: 10,
              grade: cs[ci].hw || "",
              done: cs[ci].hw !== "" && cs[ci].hw !== undefined,
            },
            {
              name: "مشاريع",
              max: 10,
              grade: cs[ci].proj || "",
              done: cs[ci].proj !== "" && cs[ci].proj !== undefined,
            },
            {
              name: "ميدترم",
              max: 30,
              grade: cs[ci].mid || "",
              done: cs[ci].mid !== "" && cs[ci].mid !== undefined,
            },
            {
              name: "فاينل",
              max: 50,
              grade: cs[ci].final || "",
              done: cs[ci].final !== "" && cs[ci].final !== undefined,
            },
          ];
        }
      }

      function toggleComponentDone(ci, compi) {
        const cs = loadData("uniCourses") || [];
        if (!cs[ci]) return;
        _ensureComponents(cs, ci);
        const comp = cs[ci].components[compi];
        comp.done = !comp.done;
        if (!comp.done) comp.grade = "";
        saveData("uniCourses", cs);
        _syncCoursesNow();
        renderCourseCards();
        setTimeout(() => {
          const card = document.getElementById(`courseCard${ci}`);
          if (card) card.classList.add("open");
        }, 10);
      }

      function updateComponent(ci, compi, val) {
        const cs = loadData("uniCourses") || [];
        if (!cs[ci]) return;
        _ensureComponents(cs, ci);
        const comp = cs[ci].components[compi];
        const numVal = val === "" ? "" : Math.min(+(val || 0), comp.max);
        cs[ci].components[compi].grade = numVal;
        const doneMax = calcDoneMax(cs[ci]);
        const doneTotal = calcDoneTotal(cs[ci]);
        const donePct = doneMax > 0 ? (doneTotal / doneMax) * 100 : 0;
        cs[ci].status =
          doneMax === 0
            ? "warn"
            : donePct >= 85
              ? "safe"
              : donePct >= 70
                ? "warn"
                : "danger";
        saveData("uniCourses", cs);
        _syncCoursesNow();
        renderCourseCards();
        setTimeout(() => {
          const card = document.getElementById(`courseCard${ci}`);
          if (card) card.classList.add("open");
        }, 10);
      }

      function updateCourseName(i, val) {
        const cs = loadData("uniCourses") || [];
        if (cs[i]) {
          cs[i].name = val;
          saveData("uniCourses", cs);
          _syncCoursesNow();
        }
      }

      function renderCoursesTable() {
        renderCourseCards();
      }
      function getGPALive() {
        const cs = loadData("uniCourses") || [];
        const pts = {
          "A+": 5,
          A: 5,
          "B+": 4.5,
          B: 4,
          "C+": 3.5,
          C: 3,
          "D+": 2.5,
          D: 2,
          F: 0,
        };
        const toGr = (t) =>
          t >= 95
            ? "A+"
            : t >= 90
              ? "A"
              : t >= 85
                ? "B+"
                : t >= 80
                  ? "B"
                  : t >= 75
                    ? "C+"
                    : t >= 70
                      ? "C"
                      : t >= 65
                        ? "D+"
                        : t >= 60
                          ? "D"
                          : "F";
        // use done-normalized score for GPA; only include courses with at least some done grades
        const withG = cs.filter((c) => calcDoneMax(c) > 0);
        if (!withG.length) return "--";
        const ws = withG.reduce((s, c) => {
          const dm = calcDoneMax(c);
          const dt = calcDoneTotal(c);
          const norm = dm > 0 ? Math.round((dt / dm) * 100) : 0;
          return s + (pts[toGr(norm)] || 0) * +(c.credits || 3);
        }, 0);
        const tc = withG.reduce((s, c) => s + +(c.credits || 3), 0);
        return tc ? (ws / tc).toFixed(2) : "--";
      }

      function updateGPA() {
        const cs = loadData("uniCourses") || [];
        const withGrades = cs.filter((c) => calcTotal(c) > 0);
        if (!withGrades.length) {
          saveData("uniGPA", "--");
          return;
        }
        const pts = {
          "A+": 5,
          A: 5,
          "B+": 4.5,
          B: 4,
          "C+": 3.5,
          C: 3,
          "D+": 2.5,
          D: 2,
          F: 0,
        };
        const toGrade = (t) =>
          t >= 95
            ? "A+"
            : t >= 90
              ? "A"
              : t >= 85
                ? "B+"
                : t >= 80
                  ? "B"
                  : t >= 75
                    ? "C+"
                    : t >= 70
                      ? "C"
                      : t >= 65
                        ? "D+"
                        : t >= 60
                          ? "D"
                          : "F";
        const ws = withGrades.reduce(
          (s, c) => s + (pts[toGrade(calcTotal(c))] || 0) * (c.credits || 0),
          0,
        );
        const tc = withGrades.reduce((s, c) => s + (c.credits || 0), 0);
        const gpaVal = tc ? (ws / tc).toFixed(2) : "--";
        saveData("uniGPA", gpaVal);
        const uid = user?.uid || user?.email;
        if (uid && window.fsSyncGpaToFirestore && gpaVal !== "--")
          window.fsSyncGpaToFirestore(uid, gpaVal);
      }

      async function submitPrediction() {
        const subjects = [

          "Physics",
          "Chemistry",
          "English",
          "Digital_Technology",
          "Critical_Thinking",
          "Linguistic_Competencies",

          "Ecology",
          "Vocational_Education",
          "Social_Studies",
          "Hadith",
          "Physical_Health",
          "Financial_Literacy",
          "Statistics",
        ];

        const body = {};
        for (const s of subjects) {
          const val = parseFloat(document.getElementById("pred_" + s)?.value);

              `أدخل درجة صحيحة (0-100) في حقل: ${s.replace(/_/g, " ")}`,
              "error",
            );
            return;
          }
          body[s] = val;
        }

        body.GPA = parseFloat(document.getElementById("pred_GPA")?.value);
        if (isNaN(body.GPA) || body.GPA < 0 || body.GPA > 5) {
          showToast("أدخل المعدل التراكمي بشكل صحيح (0 - 5)", "error");
          return;
        }

        body.Grade_Level = parseInt(
          document.getElementById("pred_Grade_Level")?.value,
        );
        body.Attendance_Behavior =
          document.getElementById("pred_Attendance")?.value;
        body.Interest = document.getElementById("pred_Interest")?.value;

          btn.disabled = true;

      function containsBannedWord(text) {
        if (!text) return false;
        const t = text
          .replace(/[إأآا]/g, "ا")
          .replace(/ى/g, "ي")
          .replace(/ة/g, "ه")
          .replace(/\s+/g, " ")
          .trim();
        return BANNED_WORDS.some((w) =>
          t.includes(
            w
              .replace(/[إأآا]/g, "ا")
              .replace(/ى/g, "ي")
              .replace(/ة/g, "ه"),
          ),
        );

      async function publishPost() {

          brief = null;
          if (!text) {
            showToast("اكتب رسالتك أولاً", "error");
            return;
          }
        }
        if (containsBannedWord(text) || (brief && containsBannedWord(brief))) {
          showToast("رسالتك تحتوي على كلمات غير لائقة", "error");
          return;
        }
        showToast("جاري فحص الرسالة...", "info");
        try {
          const res = await fetch(`${BACKEND_URL}/classify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          if (res.ok) {
            const data = await res.json();
            if (data.is_offensive) {
              showToast("رسالتك تحتوي على محتوى غير لائق", "error");
              return;
            }
          }
        } catch (e) {
          console.warn("API غير متاح");

          document.getElementById("postTopic")?.value || "general";

          text,
          brief: brief || null,
          isPrivate,
          topic: topicId,

        const posts = loadData("communityPosts") || [];

        myIds.unshift(newId);

        if (window._fsReady)

      window.requestMentorship = function (mentorUid, mentorName, mentorType) {
        if (!mentorUid) {
          showToast("تعذر إرسال الطلب", "error");
          return;
        }
        // Use the new real-time modal from community-fix.js
        if (typeof openSendRequest === "function") {
          const intro = `أهلاً ${mentorName}، أنا ${user.name} (${user.type === "university" ? "طالب جامعي" : "طالب ثانوي"}) من ${user.city || "مدينتي"}. أتمنى الاستفادة من خبرتك وأن أكون من طلابك.`;
          openSendRequest(mentorName, mentorUid);
          setTimeout(() => {
            const msgInput = document.getElementById("reqMsg");
            if (msgInput) msgInput.value = intro;
          }, 100);
        } else {
          showToast("تعذر فتح نافذة الإرشاد", "error");
        }
      };

      let _replyReqData = {};
      function openReplyRequest(postId, postText, toUid, toName, topicId) {
        _replyReqData = { postId, postText, toUid, toName, topicId };
        const ref = document.getElementById("replyReqPostRef");
        if (ref)
          ref.textContent = `ردّاً على: "${postText}${postText.length >= 40 ? "..." : ""}"`;
        const topicRef = document.getElementById("replyReqTopicRef");
        if (topicRef && topicId) {
          const t = getTopicById(topicId);
          topicRef.innerHTML = `<span class="post-topic-badge" style="background:${t.bg};color:${t.color};">${t.label}</span>`;
        } else if (topicRef) {
          topicRef.innerHTML = "";
        }
        const intro = document.getElementById("replyReqIntro");
        if (intro) intro.value = "";
        document.getElementById("replyReqModal")?.classList.add("show");
      }

      async function submitReplyRequest() {
        const blocked = loadData("blockedUsers") || [];
        if (blocked.find((b) => b.uid === _replyReqData.toUid)) {
          showToast("لا يمكنك مراسلة هذا المستخدم", "error");
          return;
        }
        const intro =
          document.getElementById("replyReqIntro")?.value?.trim() || "";
        if (intro.length < 5) {
          showToast("اكتب رسالة قصيرة على الأقل", "error");
          return;
        }
        if (containsBannedWord(intro)) {
          showToast("رسالتك تحتوي على كلمات غير لائقة", "error");
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/classify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: intro }),
          });
          if (res.ok) {
            const d = await res.json();
            if (d.is_offensive) {
              showToast("رسالتك تحتوي على محتوى غير لائق", "error");
              return;
            }
          }
        } catch (e) {}

        const req = {
          id: Date.now(),
          postId: _replyReqData.postId,
          postText: _replyReqData.postText,
          fromUid: user.uid || user.email,
          fromName: user.name,
          fromType: user.type,
          toUid: _replyReqData.toUid,
          toName: _replyReqData.toName,
          intro,
          time: new Date().toISOString(),
          status: "pending",
        };

        // Store locally as sent request
        const sent = loadData("sentReplyRequests") || [];
        sent.unshift(req);
        saveData("sentReplyRequests", sent.slice(0, 50));

        // Deliver to recipient via Firestore or local inbox
        let saved = false;
        if (window._fsReady) {
          saved = await window
            .fsSendMessage({
              fromUid: user.uid || user.email,
              fromName: user.name,
              fromType: user.type,
              toUid: _replyReqData.toUid,
              toName: _replyReqData.toName,
              text: intro,
              msgType: "reply_request",
              postId: _replyReqData.postId,
              postText: _replyReqData.postText,
            })
            .catch(() => false);
        }
        if (!saved) {
          const inbox = loadData("communityInbox") || [];
          inbox.unshift({
            id: req.id,
            msgType: "reply_request",
            from: user.name,
            fromType: user.type,
            fromUid: user.uid || user.email,
            to: _replyReqData.toName,
            toUid: _replyReqData.toUid,
            message: intro,
            postId: _replyReqData.postId,
            postText: _replyReqData.postText,
            time: new Date().toISOString(),
            read: false,
            status: "pending",
          });
          saveData("communityInbox", inbox);
        }

        document.getElementById("replyReqModal")?.classList.remove("show");
        showToast("تم إرسال طلبك — انتظر رد صاحب المنشور");
        addNotification(
          "طلب رد مُرسَل",
          `طلبك لـ ${_replyReqData.toName} في انتظار الموافقة`,
          "info",
        );
      }

      function approveReplyRequest(reqId) {
        // Search in global cache first (includes Firebase messages), fallback to localStorage
        const req =
          (window._currentInbox || []).find(
            (m) => String(m.id) === String(reqId),
          ) ||
          (loadData("communityInbox") || []).find(
            (m) => String(m.id) === String(reqId),
          );
        if (!req) {
          showToast("تعذر إيجاد الطلب", "error");
          return;
        }
        // Update status in localStorage copy if present
        const inbox = loadData("communityInbox") || [];
        const local = inbox.find((m) => String(m.id) === String(reqId));
        if (local) {
          local.status = "approved";
          saveData("communityInbox", inbox);
        }
        // Mark read in Firebase
        if (window._fsReady && typeof reqId === "string" && reqId.length > 10) {
          window.fsMarkRead(reqId).catch(() => {});
        }

        // Create conversation
        const convs = loadData("conversations") || [];
        const exists = convs.find(
          (c) => c.withUid === req.fromUid && c.status === "active",
        );
        if (!exists) {
          convs.unshift({
            id: "conv_" + Date.now(),
            withUid: req.fromUid,
            withName: req.fromName,
            withType: req.fromType,
            postId: req.postId,
            postText: req.postText,
            messages: [
              {
                from: req.fromUid,
                fromName: req.fromName,
                text: req.message || req.intro || "",
                time: req.time,
              },
            ],
            status: "active",
            lastMsg: req.message || req.intro || "",
            lastTime: req.time,
          });
          saveData("conversations", convs.slice(0, 50));
        }

        // Notify requester — include full conv data so they can create the conversation on their side
        const convId = "conv_" + Date.now();
        const notifMsg = `وافق ${user.name} على طلب ردّك — يمكنك الآن التواصل معه من قسم المحادثات`;
        if (window._fsReady) {
          window
            .fsSendMessage({
              fromUid: user.uid || user.email,
              fromName: user.name,
              fromType: user.type,
              toUid: req.fromUid,
              toName: req.fromName,
              text: notifMsg,
              msgType: "approval",
              convId,
              postId: req.postId || "",
              postText: req.postText || "",
              approverUid: user.uid || user.email,
              approverName: user.name,
              approverType: user.type,
            })
            .catch(() => {});
        }

        showToast("تمت الموافقة — يمكنك الآن المحادثة");
        renderCommunityMsgs();
      }

      function rejectReplyRequest(reqId) {
        const inbox = loadData("communityInbox") || [];
        const local = inbox.find((m) => String(m.id) === String(reqId));
        if (local) {
          local.status = "rejected";
          saveData("communityInbox", inbox);

        saveData("blockedUsers", blocked);
        // Also stop conversation
        const convs = loadData("conversations") || [];

        const convs = loadData("conversations") || [];
        const conv = convs.find((c) => c.id === convId);

      async function sendChatMsg(convId) {
        const input = document.getElementById("chatInput_" + convId);
        const text = input?.value?.trim() || "";
        if (!text || text.length < 1) return;
        if (containsBannedWord(text)) {
          showToast("رسالتك تحتوي على كلمات غير لائقة", "error");
          return;
        }

        const convs = loadData("conversations") || [];
        const conv = convs.find((c) => c.id === convId);
        if (!conv || conv.status === "stopped") {
          showToast("المحادثة موقوفة", "error");
          return;
        }

        const msg = {
          from: user.uid || user.email,
          fromName: user.name,
          text,
          time: new Date().toISOString(),
        };
        conv.messages.push(msg);
        conv.lastMsg = text;
        conv.lastTime = msg.time;
        saveData("conversations", convs);

        // Deliver to the other person
        if (window._fsReady) {
          window
            .fsSendMessage({
              fromUid: user.uid || user.email,
              fromName: user.name,
              fromType: user.type,
              toUid: conv.withUid,
              toName: conv.withName,
              text,
              msgType: "chat",
              convId,
            })
            .catch(() => {});
        } else {
          const inbox = loadData("communityInbox") || [];
          inbox.unshift({
            id: Date.now(),
            msgType: "chat",
            from: user.name,
            fromType: user.type,
            fromUid: user.uid || user.email,
            message: text,
            time: msg.time,
            read: false,
            convId,
          });
          saveData("communityInbox", inbox);
        }

        input.value = "";
        renderConvChat(convId);
      }

            <div style="font-weight:700;">${r.author || r.name || "طالب"}</div>
            <div style="font-size:12px;color:var(--text-muted);">${{ secondary: "طالب ثانوي", university: "طالب جامعي" }[r.type] || r.type} · ${r.city || ""} · ${new Date(r.time || Date.now()).toLocaleString("ar-SA", { hour: "2-digit", minute: "2-digit", month: "short", day: "numeric" })}</div>
          </div>
        </div>
        ${r.answered ? `<span class="tag tag-gold" style="flex-shrink:0;">تمت الإجابة · ${r.answeredBy || "مرشد"}</span>` : '<span class="tag tag-green" style="flex-shrink:0;">بانتظار رد</span>'}
      </div>
      <div style="font-size:14px;color:var(--text-mid);line-height:1.7;margin-bottom:14px;background:var(--bg);border-radius:10px;padding:14px;">${r.text}</div>
      ${
        !r.answered
          ? `
      <textarea class="form-textarea" id="mentorReply_${r.id}" rows="3" placeholder="اكتب ردك الأكاديمي هنا... (على الأقل 20 حرفاً)"></textarea>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:10px;">
        <button class="btn btn-primary btn-sm" onclick="sendMentorReply('${r.id}','${r.fromUid || ""}','${(r.author || r.name || "").replace(/'/g, "\\'")}')">إرسال الرد ↗</button>
      </div>
      <div id="replySent_${r.id}" style="display:none;background:var(--green-light);color:var(--green-dark);border-radius:10px;padding:10px;margin-top:8px;font-size:13px;font-weight:600;">تم إرسال ردك بنجاح — سيصل إلى الطالب في صندوق رسائله</div>
      `
          : `<div style="background:var(--green-light);color:var(--green-dark);border-radius:10px;padding:10px;font-size:13px;">تمت الإجابة من: ${r.answeredBy || "مرشد"}</div>`
      }
    </div>`,
          )
          .join("");
      }

      async function sendMentorReply(requestId, studentUid, studentName) {
        const textEl = document.getElementById("mentorReply_" + requestId);
        const text = textEl ? textEl.value.trim() : "";
        if (!text || text.length < 20) {
          showToast("اكتب ردًا أكثر تفصيلاً (20 حرف على الأقل)", "error");
          return;
        }
        const sentEl = document.getElementById("replySent_" + requestId);
        if (textEl) textEl.style.display = "none";

        let saved = false;
        if (window._fsReady && studentUid) {
          saved = await window.fsSaveReply(
            requestId,
            user.uid || user.email,
            user.name,
            studentUid,
            studentName,
            text,
          );
        }
        if (!saved) {
          // Fallback: save to communityInbox locally
          const inbox = loadData("communityInbox") || [];
          inbox.unshift({
            id: Date.now(),
            from: user.name,
            fromType: "mentor",
            to: studentName,
            toUid: studentUid,
            message: text,
            time: new Date().toISOString(),
            read: false,
          });
          saveData("communityInbox", inbox);
        }

        if (sentEl) sentEl.style.display = "block";
        const helped = loadData("mentorHelped") || 0;
        saveData("mentorHelped", helped + 1);
        addNotification(
          "تم إرسال ردك",
          "ردّك الأكاديمي وصل إلى الطالب " + studentName,
          "success",
        );
        showToast("تم إرسال ردك");

        // Mark in local cache
        _currentRequests = _currentRequests.map((r) =>
          r.id === requestId
            ? { ...r, answered: true, answeredBy: user.name }
            : r,
        );
      }

      // ─── GUIDANCE LISTS ───────────────────────────────────────────
      function renderGuidanceLists() {
        const mc = document.getElementById("mainContent");
        const myStudents = loadData("myStudents") || [];

        if (myStudents.length === 0) {
          mc.innerHTML = `
      <div class="card anim-up" style="max-width:680px;margin:0 auto;text-align:center;padding:48px 24px;">
        <div style="font-size:48px;margin-bottom:16px;">&#128101;</div>
        <h3 style="margin-bottom:8px;">لا يوجد طلاب في قوائمك بعد</h3>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">عند قبول طلبات الإرشاد من الطلاب ستظهر قوائمهم هنا.</p>
        <button class="btn btn-primary" onclick="navigateTo('requests')">طلبات الطلاب</button>
      </div>`;
          return;
        }

        mc.innerHTML = `
    <div class="card anim-up" style="max-width:780px;margin:0 auto;">
      <h2 style="margin-bottom:4px;">قوائم الإرشاد</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">الطلاب الذين تشرف على إرشادهم (${myStudents.length})</p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${myStudents
          .map(
            (s) => `
          <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-card);border-radius:12px;border:1px solid var(--border);">
            <div style="width:44px;height:44px;border-radius:50%;background:#1a3a6a;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0;">
              ${(s.name || "؟")[0]}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:600;font-size:15px;">${s.name || "طالب"}</div>
              <div style="color:var(--text-muted);font-size:12px;margin-top:2px;">${s.type === "university" ? "طالب جامعي" : s.type === "secondary" ? "طالب ثانوي" : "طالب"} ${s.city ? "· " + s.city : ""}</div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0;">
              <button class="btn btn-sm btn-outline" onclick="showMemberProfile('${s.uid || s.id || ""}','${(s.name || "").replace(/'/g, "")}')">عرض الملف</button>
              <button class="btn btn-sm btn-primary" onclick="openSendRequest('${(s.name || "").replace(/'/g, "")}','${s.uid || s.id || ""}')">راسل</button>
            </div>
          </div>`,
          )
          .join("")}
      </div>
    </div>`;
      }

      // ─── NOTIFICATIONS ────────────────────────────────────────────
      function toggleNotifs() {
        closeAll();
        const panel = document.getElementById("notifPanel");
        panel.classList.toggle("open");
        if (panel.classList.contains("open")) renderNotifList();
      }
      function renderNotifList() {
        const notifs = loadData("notifications") || [];
        const el = document.getElementById("notifList");
        el.innerHTML = notifs.length
          ? notifs
              .map(
                (n) => `
    <div class="notif-item ${n.read ? "" : "unread"}" onclick="markRead(${n.id})">
      <div class="notif-title">${n.title}</div>
      <div class="notif-body">${n.body}</div>
      <div class="notif-time">${new Date(n.time).toLocaleString("ar-SA")}</div>
    </div>`,
              )
              .join("")
          : '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">لا توجد إشعارات</div>';
      }
      function markRead(id) {
        const notifs = loadData("notifications") || [];
        const n = notifs.find((n) => n.id === id);
        if (n) n.read = true;
        saveData("notifications", notifs);
        updateNotifBadge();
        renderNotifList();
      }
      function markAllRead() {
        const notifs = (loadData("notifications") || []).map((n) => ({
          ...n,
          read: true,
        }));
        saveData("notifications", notifs);
        updateNotifBadge();
        renderNotifList();
      }

      // ─── PROFILE PANEL ───────────────────────────────────────────
      function toggleProfile() {
        closeAll();
        const panel = document.getElementById("profilePanel");
        panel.classList.toggle("open");
        if (panel.classList.contains("open")) {
          document.getElementById("profileContent").innerHTML = `
      <div class="profile-avatar-lg">${user.avatar || user.name[0]}</div>
      <div class="profile-name">${user.name}</div>
      <div class="profile-tag">${TYPE_LABELS[user.type] || ""}</div>
      ${[
        ["المدينة", user.city],
        ["المنطقة", user.region],
        ["الجوال", user.phone],
        ["الإيميل", user.email],
      ]
        .filter((r) => r[1])
        .map(
          (r) => `
        <div class="profile-info-row"><span class="profile-info-label">${r[0]}</span><span class="profile-info-val">${r[1]}</span></div>`,
        )
        .join("")}
      <button class="btn btn-outline btn-full" style="margin-top:14px;" onclick="navigateTo('profile');closeAll()">عرض الملف الكامل</button>`;
        }
      }

      function closeAll() {
        document.getElementById("notifPanel").classList.remove("open");
        document.getElementById("profilePanel").classList.remove("open");
      }
      function showSupport() {
        document.getElementById("supportModal").classList.add("show");
      }
      function sendSupport() {
        document.getElementById("supportModal").classList.remove("show");
        showToast("تم إرسال طلب الدعم");
      }

      // ─── INIT ────────────────────────────────────────────────────
      buildSidebar();
      updateNotifBadge();
      navigateTo(user.type === "mentor" ? "requests" : "home");

      // فحص التذكيرات بالاختبارات كل يوم
      function checkExamReminders() {
        ["qiyas", "tahsili", "step"].forEach((exam) => {
          const plan = loadData("examPlan_" + exam) || {};
          if (plan.decided === "decided" && plan.date) {
            const days = getDaysLeft(plan.date);
            if (days <= 30 && days > 0) {
              const names = {
                qiyas: "القدرات",
                tahsili: "التحصيلي",
                step: "ستيب",
              };
              const lastReminder = loadData("lastReminder_" + exam);
              const today = new Date().toDateString();
              if (lastReminder !== today) {
                addNotification(
                  `تذكير: باقي ${days} يوم على اختبار ${names[exam]}`,
                  `استمر في المذاكرة والتحضير، أنت قادر على التفوق`,
                  "warning",
                );
                saveData("lastReminder_" + exam, today);
              }
            }
          }
        });
      }

      // فحص التذكيرات عند التحميل
      setTimeout(() => {
        try {
          checkExamReminders();
        } catch {}
      }, 3000);

      // فحص الرسائل الجديدة
      setTimeout(() => {
        const inbox = loadData("communityInbox") || [];
        const unread = inbox.filter((m) => !m.read);
        if (unread.length > 0) {
          showMsgPopup(`لديك رسالة من ${unread[0].from}`);
        }
      }, 2000);

      document.addEventListener("click", (e) => {
        if (
          !e.target.closest("#notifPanel") &&
          !e.target.closest('[onclick="toggleNotifs()"]')
        )
          document.getElementById("notifPanel").classList.remove("open");
        if (
          !e.target.closest("#profilePanel") &&
          !e.target.closest('[onclick="toggleProfile()"]')
        )
          document.getElementById("profilePanel").classList.remove("open");
      });
    </script>
    <script type="module">
      import("./frontend/js/community-fix.js").catch(() =>
        console.warn("community-fix.js غير موجود أو مساره غير صحيح"),
      );
      window.addEventListener("load", () => {
        setTimeout(() => window.updatePostsBadge?.(), 1000);
      });
    </script>
  </body>
</html>
